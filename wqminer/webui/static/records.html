<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>记录查看</title>
    <link rel="stylesheet" href="/ui/ui.css" />
  </head>
  <body>
    <header>
      <h1>记录查看</h1>
      <p>查看自动回测与结果日志（jsonl/json/csv）。</p>
    </header>
    <nav class="nav">
      <a href="/ui/index.html">首页</a>
      <a href="/ui/fields.html">字段拉取</a>
      <a href="/ui/inspiration.html">灵感与模板</a>
      <a href="/ui/optimize.html">提交-反馈-优化</a>
      <a href="/ui/jobs.html">任务列表</a>
    </nav>
    <main class="container">
      <section class="card">
        <h2>日志列表</h2>
        <div class="form-grid">
          <div>
            <label>范围</label>
            <select id="log-scope">
              <option value="auto_runs" selected>auto_runs</option>
              <option value="results">results</option>
              <option value="all">all</option>
            </select>
          </div>
          <div>
            <label>日志文件</label>
            <select id="log-select"></select>
          </div>
          <div>
            <label>读取行数</label>
            <input id="log-tail" value="200" />
          </div>
        </div>
        <div class="inline">
          <button id="log-refresh">刷新列表</button>
          <button id="log-view" class="secondary">查看内容</button>
        </div>
        <p class="notice">大文件会自动截断为尾部内容。</p>
      </section>
      <section class="card">
        <h2>日志内容</h2>
        <div class="status"><pre id="log-content"></pre></div>
      </section>
    </main>
    <footer>
      仅展示 results/auto_runs 与 results 目录内的日志文件。
    </footer>
    <script src="/ui/app.js?v=9"></script>
  </body>
</html>
