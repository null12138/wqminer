<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>字段拉取</title>
    <link rel="stylesheet" href="/ui/ui.css" />
  </head>
  <body>
    <header>
      <h1>字段拉取</h1>
      <p>从 WorldQuant API 拉取字段并缓存到本地。</p>
    </header>
    <nav class="nav">
      <a href="/ui/index.html">首页</a>
      <a href="/ui/inspiration.html">灵感与模板</a>
      <a href="/ui/optimize.html">提交-反馈-优化</a>
      <a href="/ui/records.html">记录查看</a>
      <a href="/ui/jobs.html">任务列表</a>
    </nav>
    <main class="container">
      <section class="card">
        <h2>创建任务</h2>
        <form class="job-form" data-job-type="fetch_fields" data-status-target="job-status" data-result-target="job-result">
          <div class="form-grid">
            <div>
              <label>Region</label>
              <input name="region" value="USA" />
            </div>
            <div>
              <label>Universe</label>
              <input name="universe" placeholder="TOP3000" />
            </div>
            <div>
              <label>Delay</label>
              <input name="delay" value="1" />
            </div>
            <div>
              <label>Credentials 文件路径</label>
              <input name="credentials" placeholder="credentials.json" />
            </div>
            <div>
              <label>用户名</label>
              <input name="username" placeholder="your_email" />
            </div>
            <div>
              <label>密码</label>
              <input name="password" type="password" />
            </div>
            <div>
              <label>Full 模式</label>
              <input name="full" type="checkbox" />
            </div>
            <div>
              <label>输出字段文件</label>
              <input name="output" placeholder="data/cache/data_fields_USA_1_TOP3000.json" />
            </div>
            <div>
              <label>输出数据集文件</label>
              <input name="dataset_output" placeholder="data/cache/data_sets_USA_1_TOP3000.json" />
            </div>
          </div>
          <details style="margin-top:12px;">
            <summary>高级参数</summary>
            <div class="form-grid" style="margin-top:10px;">
              <div>
                <label>Max Datasets</label>
                <input name="max_datasets" value="10" />
              </div>
              <div>
                <label>Field Max Pages</label>
                <input name="field_max_pages" value="5" />
              </div>
              <div>
                <label>Dataset Max Pages</label>
                <input name="dataset_max_pages" value="1" />
              </div>
              <div>
                <label>Dataset Page Limit</label>
                <input name="dataset_page_limit" value="50" />
              </div>
            </div>
          </details>
          <div class="inline">
            <button type="submit">开始拉取</button>
          </div>
        </form>
      </section>
      <section class="card">
        <h2>任务状态</h2>
        <div id="job-status" class="status"></div>
        <div class="status" style="margin-top:10px;"><pre id="job-result"></pre></div>
      </section>
    </main>
    <footer>
      建议优先使用 credentials.json，避免在页面输入明文密码。
    </footer>
    <script src="/ui/app.js?v=9"></script>
  </body>
</html>
