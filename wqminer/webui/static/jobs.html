<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>任务列表</title>
    <link rel="stylesheet" href="/ui/ui.css" />
  </head>
  <body>
    <header>
      <h1>任务列表</h1>
      <p>显示最近任务状态与创建时间。</p>
    </header>
    <nav class="nav">
      <a href="/ui/index.html">首页</a>
      <a href="/ui/fields.html">字段拉取</a>
      <a href="/ui/inspiration.html">灵感与模板</a>
      <a href="/ui/optimize.html">提交-反馈-优化</a>
      <a href="/ui/records.html">记录查看</a>
    </nav>
    <main class="container">
      <section class="card">
        <h2>最近任务</h2>
        <div class="status"><pre id="jobs-list"></pre></div>
      </section>
      <section class="card">
        <h2>停止任务</h2>
        <form class="cancel-form" data-status-target="cancel-status">
          <div class="form-grid">
            <div>
              <label>Job ID</label>
              <input name="job_id" placeholder="输入要终止的 Job ID" />
            </div>
          </div>
          <div class="inline">
            <button type="submit" class="secondary">停止任务</button>
          </div>
        </form>
        <div id="cancel-status" class="status" style="margin-top:10px;"></div>
      </section>
    </main>
    <footer>
      任务信息存于内存，重启 WebUI 会清空。
    </footer>
    <script src="/ui/app.js?v=9"></script>
  </body>
</html>
